# DIAGNOSTIC PROBE ONLY (P3-6 item 1): Level A dynamic admittance on the halved-dx gas
# config (gas_air_10k_d2q37_levelc_dx1p3_probe.yaml) to test whether finer near-wall
# resolution converges the Grad-wall amplitude residual once the conductive heat-flux
# EXPORT is calibrated at the dx1p3 10 kHz feature wavenumber (k~0.049; the export ratio
# is strongly k-local -- ~0.51 at k/2 under the dx2p6 calibration -- so the probe is only
# meaningful with the feature-k-calibrated factor). ny doubled to keep the same physical
# half-infinite depth (~4.7 delta_T). Same methodology as the committed dx2p6 Level A run
# (phase3_levela_admittance_10k_dx2p6.yaml, Y -5.3%/+2.2 deg baseline for comparison).
# NOT a production config; feeds the P3-6 finer-dx decision only.
case:
  name: phase3_levela_admittance_10k_dx1p3_probe
  phase: Phase_3
  level: A
  purpose: P3-6 finer-dx re-evaluation probe (Level A admittance at dx1p3); DIAGNOSTIC, not production

inheritance:
  gas_config_path: configs/gas_air_10k_d2q37_levelc_dx1p3_probe.yaml
  phase3_contract: docs/Phase_3/phase3_instruction_v1.0.md

physical:
  frequency_Hz: 1.0e4
  T0_K: 300.0
  wall_temperature_hat_K: 0.354   # matches the dx2p6 baseline run
  kg_W_mK: 0.0263
  alpha0_m2_s: 2.2233775895e-5

level_a:
  wall_bc: thermal_grad
  grad_extrap: linear
  rho_wall_policy: pressure_preserving
  phase_convention: x(t)=Re[x_hat exp(i Omega t)]

numerics:
  nx: 8
  ny: 96                          # dx halved -> rows doubled: same ~4.7 delta_T physical depth
  periods: 2

gates:
  admittance_amplitude_relative_error: 0.05
  admittance_phase_error_deg: 5.0
  no_nan: true
  no_clipping_or_floor: true

references:
  baseline_run: configs/phase3_levela_admittance_10k_dx2p6.yaml (Y -5.3%/+2.2 deg)
  wall_bc_owner: boundary/wall_thermal_grad.py
  heat_flux_extraction_owner: coupling/conjugate.py (extract_bottom_wall_heat_flux_si, row 1)
  admittance_reference_owner: reference/thermal_admittance.py

output:
  results_root: results/phase3_levela_admittance
