# Phase_3 P3-6 Level A dynamic thermal admittance with the Grad regularized thermal wall
# (boundary/wall_thermal_grad.py). Prescribes a sinusoidal wall temperature (no film, no
# coupling), extracts the near-wall one-sided conductive q_g'' (row 1, same convention as
# coupling/conjugate.py), and fits Y = q_hat / T_wall_hat against the analytic half-space
# admittance Y_g = k_g sqrt(i Omega / alpha_g). This is the committed replacement for the
# scratchpad probe recorded in Phase3_STATUS.md (2026-07-01): expected scoped outcome at
# 10 kHz dx2p6 is amplitude ~-5.3% (at the <5% boundary) / phase ~+2.2 deg (PASS).
case:
  name: phase3_levela_admittance_10k_dx2p6
  phase: Phase_3
  level: A
  purpose: P3-6 Level A dynamic thermal admittance (Grad wall) vs analytic half-space reference
  status: m3_phase_pass_amplitude_boundary

inheritance:
  gas_config_path: configs/gas_air_10k_d2q37_levelc_dx2p6.yaml
  phase3_contract: docs/Phase_3/phase3_instruction_v1.0.md

physical:
  frequency_Hz: 1.0e4
  T0_K: 300.0
  wall_temperature_hat_K: 0.354   # linear response: amplitude choice does not affect Y; matches Level C T_s scale
  # analytic half-space gas admittance reference Y_g = k_g sqrt(i Omega / alpha_g)
  kg_W_mK: 0.0263
  alpha0_m2_s: 2.2233775895e-5

level_a:
  wall_bc: thermal_grad
  grad_extrap: linear             # near-wall non-equilibrium extrapolation (matches Level C)
  rho_wall_policy: pressure_preserving
  phase_convention: x(t)=Re[x_hat exp(i Omega t)]

numerics:
  nx: 8
  ny: 48                          # half-infinite near-wall thermal layer (~4.7 delta_T at 10 kHz)
  periods: 2                      # settle 1 + fit last 1

gates:
  admittance_amplitude_relative_error: 0.05
  admittance_phase_error_deg: 5.0
  no_nan: true
  no_clipping_or_floor: true

references:
  wall_bc_owner: boundary/wall_thermal_grad.py
  heat_flux_extraction_owner: coupling/conjugate.py (extract_bottom_wall_heat_flux_si, row 1)
  admittance_reference_owner: reference/thermal_admittance.py
  phase_convention_owner: phase3_interfaces/complex_amplitude.py

output:
  results_root: results/phase3_levela_admittance
