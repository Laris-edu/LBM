case:
  name: phase3_levelb_flux_10k
  phase: Phase_3
  level: B
  purpose: P3-2 Level B prescribed wall heat-flux smoke and contract verification
  status: implementation_smoke_not_m3_pass

inheritance:
  gas_config_path: configs/gas_air_10k_d2q37_physical_timestep.yaml
  phase3_contract: docs/Phase_3/phase3_instruction_v1.0.md
  m3_smoke_contract: configs/phase3_m3_smoke.yaml

physical:
  frequency_Hz: 1.0e4
  q_wall_mean_W_m2: 0.0
  q_wall_hat_W_m2: 10.0

level_b:
  wall: bottom
  wall_domain: upper_half_domain_gas_y_positive
  wall_normal_convention: n_plus_ey_from_film_to_gas
  heat_flux_sign_convention: positive_one_sided_gas_flux_qg_equals_minus_k_dTdy_at_0_plus
  boundary_contract:
    velocity: no_slip_u_wall_zero
    heat_flux: prescribed_positive_one_sided_q_wall_from_film_to_gas
  rho_wall_policy: pressure_preserving
  inject_energy: true
  theta_q_rule: quadrature_temperature_only_never_wall_temperature
  phase_convention: x(t)=Re[x_hat exp(i Omega t)]

numerics:
  nx: 16
  ny: 16
  sinusoidal_samples: 64

gates:
  recovered_heat_flux_relative_error: 1.0e-10
  recovered_heat_flux_phase_error_deg: 1.0e-8
  # Energy residual is normalised by the flux-independent total field energy; the gate is a
  # floating-point closure budget (~N*Q*eps with margin), not tied to the imposed flux size.
  energy_residual_relative: 1.0e-11
  normal_velocity_leakage_lu: 1.0e-8
  tangential_heat_flux_lu: 1.0e-12
  no_nan: true
  no_clipping_or_floor: true

references:
  heat_flux_interface: phase3_interfaces/heat_flux_extraction.py
  phase_convention_owner: phase3_interfaces/complex_amplitude.py
  wall_state_owner: boundary/wall_neumann.py

output:
  results_root: results/phase3_levelb_wall_flux
  summary_required_fields:
    - status
    - level
    - m3_gate
    - reference_source
    - amplitude_errors
    - phase_errors_deg
    - energy_residual
    - stability_flags
    - known_risk_boundaries
