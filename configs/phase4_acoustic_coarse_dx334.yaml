# Phase_4 P4-D3 coarse acoustic subdomain (docs/Phase_4/M4/P4_D3_Multidomain_Acoustic_Project.md).
#
# This is the INDEPENDENT acoustic domain of the multi-domain extrapolation route: a coarse,
# dispersion-free grid that carries sound ONLY and does NOT resolve heat. It is derived from the
# Phase_3 Level C gas config gas_air_10k_d2q37_levelc_dx2p6.yaml by:
#   (1) coarsening dx 2.6118 um -> 334 um (10 kHz air wavelength 34.7 mm -> lambda/dx ~ 104,
#       domain height 512*dx ~ 5 wavelengths), dt scaled by the frozen sound-speed ratio
#       (dt/dx = 1.95881e-9/2.61175e-6) so c_lu and theta_ref_lu are UNCHANGED;
#   (2) using a tuned artificial acoustic viscosity nu0/alpha0 x100 (Pr preserved) so tau21 ~ 0.573
#       -- sound is inviscid at leading order, the tuned tau only sets numerical dissipation;
#   (3) SIMPLIFIED COLLISION (the D3 core step): dispersion correction OFF, acoustic-phase
#       correction OFF (both are thermal global FFT operators, not needed for sound and slightly
#       destabilising -- see project section 7), and acoustic_simplified_collision: true which
#       disables the fragile heat-flux min-norm regularization (its Gram goes singular under large
#       viscosity / coarse grids / reflected-energy accumulation). The local biharmonic filter is
#       KEPT ON -- it is the y-localisable stability key (project section 7).
#
# CERTIFICATION SCOPE: acoustics only (sound speed P2-6 <2%, low-dissipation propagation, backscatter
# below the P4-1 gate 0.05). It does NOT certify thermal transport/admittance -- it does not solve the
# thermal layer. The frozen production/Level C configs are UNTOUCHED (this is a separate file).
case:
  name: phase4_acoustic_coarse_dx334
  phase: Phase_4
  purpose: P4-D3 independent coarse dispersion-free acoustic subdomain; simplified collision (no dispersion / no acoustic-phase / no heat-flux regularization); certifies sound speed + clean propagation only

physical:
  T0_K: 300.0
  p0_Pa: 101325.0
  rho0_kg_m3: 1.177
  c0_m_s: 347.0
  gamma: 1.4
  cp_J_kgK: 1005.0
  kg_W_mK: 0.0263
  nu0_m2_s: 1.57e-3            # tuned artificial acoustic viscosity: production 1.57e-5 x100
  alpha0_m2_s: 2.2233775895e-3 # x100 (Pr preserved)
  Pr: 0.7061328707

lattice:
  velocity_set: D2Q37
  Q: 37
  D: 2
  S: 3
  dx_m: 334.0e-6              # coarse: 10 kHz lambda 34.7 mm -> lambda/dx ~ 104
  dt_s: 2.5049968029099264e-07 # dx * (1.95881e-9/2.61175e-6): keeps c_lu and theta_ref_lu unchanged
  theta_q_lu: 0.6979533220196852
  theta_ref_policy: physical_sound_speed
  theta_transport_policy: theta_ref_lu
  rho_ref_lu: 1.0

collision:
  model: SMRT_central_Hermite_regularized_stress
  bulk_viscosity_policy: diagnostic_zero
  nu_b_lu: auto
  central_moment_closure: second_order
  high_order_relaxation: 1.0
  trace_bulk_policy: ghost_orthogonal_local
  trace_bulk_scale: 1.0
  trace_bulk_calibration_id: null
  trace_bulk_local_divergence_curve:
    type: constant
    coefficients: [1.1052362846829455]
  use_binomial_transform: true
  # D3 core step: simplified collision -- global thermal operators off, heat-flux regularization off.
  dispersion_correction_enabled: false
  acoustic_phase_correction_enabled: false
  acoustic_simplified_collision: true
  deviatoric_stress_policy: strain_rate_isotropic
  deviatoric_strain_rate_curve:
    type: constant
    coefficients: [1.0]
  regularized_shear_xy_factor: 0.4763606253137551
  regularized_shear_normal_factor: 0.8906391739599911
  # Heat-flux regularization is bypassed by acoustic_simplified_collision; kept specified/0 for clarity.
  regularized_heat_flux_factor: 0.0
  regularized_heat_flux_factor_policy: specified
  heat_flux_retention_policy: specified
  regularized_heat_flux_f_fraction: 0.5714285714285714
  conductive_heat_flux_moment_factor: 0.0635448  # unused in the acoustic domain (kept positive for validation)

numerics:
  precision: float64
  streaming: pull
  boundary: periodic
  high_wavenumber_filter:
    enabled: true
    strength: 0.03      # section 7 stability solution: local biharmonic filter 0.03 x 6 passes.
    passes: 6           # the simplified collision drops the heat-flux regularization's incidental
                        # high-k damping, so the acoustic domain leans on this local filter for
                        # stability (the y-localisable stability key that avoids the D1 FFT wall).
  nx: 4
  ny: 512
  steps: 16
  output_interval: 1

postprocess:
  save_hdf5: false
